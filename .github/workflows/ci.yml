name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type Check, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check (client + shared)
        run: npm run check:types

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test -- --passWithNoTests

  build-web:
    name: Web Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: cd web && npx vite build

  build-server:
    name: Server Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build server
        run: npm run build 2>/dev/null || npx tsc -p server/tsconfig.json --noEmit

  e2e:
    name: E2E Tests (First-Quote Gate)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb
      NODE_ENV: test
      SESSION_SECRET: ${{ secrets.SESSION_SECRET || 'ci-session-secret-not-for-production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Only web/dist is cached here. This repo has a single root
      # package.json (no separate web/node_modules), and npm install
      # caching is already handled by setup-node's `cache: npm`.
      - name: Cache web build
        id: cache-web-dist
        uses: actions/cache@v4
        with:
          path: web/dist
          key: web-dist-${{ runner.os }}-node20-${{ hashFiles('web/src/**', 'web/index.html', 'web/vite.config.ts', 'web/tsconfig.json', 'web/public/**', 'package-lock.json') }}

      - name: Build web app
        if: steps.cache-web-dist.outputs.cache-hit != 'true'
        run: cd web && npx vite build

      - name: Push database schema
        run: npm run db:push

      - name: Start server
        run: npm run server:dev &> /tmp/server.log &

      - name: Wait for server to be healthy
        run: |
          echo "Waiting for server to respond on :5000..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/api/health > /dev/null 2>&1; then
              echo "Server is up (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/30: server not ready yet, retrying in 2s..."
            sleep 2
          done
          echo ""
          echo "ERROR: Server failed to start within 60 seconds."
          echo "This is a server startup failure, not a test failure."
          echo "Check the server logs below for the root cause:"
          echo "----------------------------------------------------"
          cat /tmp/server.log
          echo "----------------------------------------------------"
          exit 1

      - name: Smoke test critical API routes
        run: npx tsx tests/smoke.ts

      - name: Run Playwright e2e tests
        run: npx playwright test

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-startup-log
          path: /tmp/server.log
          retention-days: 7

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
